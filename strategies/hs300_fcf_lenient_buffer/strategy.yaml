# 沪深300自由现金流策略 — D版 (B版基线 + 缓冲区选样)
# 基于 B版(hs300_fcf_lenient) 增加 ±20% 缓冲区规则

name: hs300_fcf_lenient_buffer
version: "D"
baseline: false
parent: "hs300_fcf_lenient"           # 基于B版
description: |
  沪深300自由现金流选股策略 — B版基线 + 缓冲区选样
  与B版唯一差异: 选样环节增加±20%缓冲区规则，降低换手率
  选样: FCF率(FCF/EV)降序 → 缓冲区规则 → 50只
  加权: 自由现金流(FCF绝对值)加权 + 10%封顶迭代重分配 (同B版)
  版本对比:
    B版(基线):  total_mv + TTM + 宽松OCF + 纯Top50 → 年化14.58%
    D版(本文件): total_mv + TTM + 宽松OCF + 缓冲区Top50 → 降低换手率

# ──────────────────────────────────────
# 样本空间 (同B版)
# ──────────────────────────────────────
universe:
  index_code: "000300.SH"
  index_name: "沪深300"

# ──────────────────────────────────────
# 选股规则 (核心变更: 缓冲区)
# ──────────────────────────────────────
selection:
  top_n: 50
  use_ttm: true
  skip_turnover_filter: true

  # ★ 缓冲区规则 (D版新增) ★
  buffer_zone:
    enabled: true
    buffer_ratio: 0.20           # ±20%
    description: |
      第一步: 计算排序 — 对样本空间内全部合格股票，按FCF率由高到低排序，得到排名rank
      第二步: 缓冲区规则选取50只 —
        排名 ≤ 40 (N×80%)     → 必选入(无论新老成分股)
        排名 41~60 (N×80%~120%) → 缓冲区: 老成分股优先保留
        排名 > 60 (N×120%)    → 必剔除
      缓冲区处理逻辑:
        1. 先纳入排名 ≤ 40 的全部股票
        2. 在缓冲区(排名41~60)内，原有成分股优先保留
        3. 若数量仍不足50只，再按排名高低从缓冲区内新股票依次补足
        4. 最终取满50只，按排名截断
      目的: 降低样本换手率，避免临界排名股票频繁进出

# ──────────────────────────────────────
# 行业过滤 (同B版)
# ──────────────────────────────────────
industry_filter:
  method: "shenwan_plus_keywords"
  excluded_industries:
    - "银行"
    - "证券"
    - "保险"
    - "多元金融"
    - "房地产开发"
    - "房地产服务"
  excluded_keywords:
    - "金融"
    - "银行"
    - "证券"
    - "保险"
    - "地产"
    - "房产"

# ──────────────────────────────────────
# FCF计算 (同B版)
# ──────────────────────────────────────
fcf:
  capex_field: "c_pay_acq_const_fiolta"
  capex_scope: "固定资产+无形资产+其他长期资产"

  ttm_ref_periods:
    "03": "0930"
    "06": "0331"
    "09": "0630"
    "12": "0930"

  ev_market_cap: "total_mv"

  ocf_5yr:
    mode: "lenient"
    window: 5
    truncate_to_list_year: true
    missing_year_action: "skip"

  profit_quality:
    formula: "(OCF - oper_profit) / total_assets"
    cutoff_percentile: 20

# ──────────────────────────────────────
# 加权方式 (同B版: FCF绝对值加权+10%封顶迭代)
# ──────────────────────────────────────
weighting:
  method: "fcf_weighted"
  note: "选样用FCF率排序，加权用FCF绝对值 → 选样指标≠加权指标"
  single_stock_cap: 0.10
  redistribution: "iterative"

# ──────────────────────────────────────
# 调仓频率 (同B版)
# ──────────────────────────────────────
rebalance:
  frequency: "quarterly"
  rule: "second_friday_next_tradeday"
  months: [3, 6, 9, 12]

# ──────────────────────────────────────
# 防前视偏差 (同B版)
# ──────────────────────────────────────
look_ahead_protection:
  annual_report: "ann_date_as_of"
  quarterly_report: "ann_date_as_of"
  market_cap: "trade_date_as_of"

# ──────────────────────────────────────
# 代码参数映射
# ──────────────────────────────────────
code_params:
  FcfUniverse:
    index_code: "000300.SH"
    strict_ocf: false
  get_fcf_basket:
    top_n: 50
    use_ttm: true
    buffer_zone: true            # ★ D版开启缓冲区
    buffer_ratio: 0.20

# ──────────────────────────────────────
# 输出路径
# ──────────────────────────────────────
output:
  baskets: "output/hs300_fcf_lenient_buffer/all_baskets_2015_2026.json"
  nav: "output/hs300_fcf_lenient_buffer/backtest_nav_tr.csv"

# ──────────────────────────────────────
# 对标指数
# ──────────────────────────────────────
benchmark:
  index_code: "932366.CSI"
  index_name: "沪深300自由现金流指数"
  source: "中证指数官方"
  data_file: "data/932366_daily.csv"

# ──────────────────────────────────────
# 预期效果
# ──────────────────────────────────────
hypothesis:
  turnover_reduction: "预期换手率降低30-50% (缓冲区保护老成分股)"
  return_impact: "预期收益影响<0.5pp (仅临界排名标的进出有差异)"
  tracking_improvement: "预期与932366成分股重合度提高 (官方也有缓冲区规则)"
  key_mechanism: |
    以2024-12-16期为例:
    - B版: FCF率排名41-50的标的直接入选，排名51-60的全部排除
    - D版: 排名41-50的老成分股保留+新成分股按排名补足
    - 600941(中国移动): 若在上一期已在篮子中，排名41-60时可优先保留

# ──────────────────────────────────────
# 与B版对比维度
# ──────────────────────────────────────
comparison_vs_baseline:
  dimensions:
    - name: "换手率"
      metric: "每期进出标的数"
      expected: "D版显著降低"
    - name: "年化收益"
      metric: "NAV年化"
      expected: "差异<0.5pp"
    - name: "成分股重合度"
      metric: "与932366的Recall"
      expected: "D版≥B版"
    - name: "权重Spearman"
      metric: "与932366权重相关性"
      expected: "D版≥B版"
    - name: "最大回撤"
      metric: "最大回撤"
      expected: "相近"
