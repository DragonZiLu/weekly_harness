# 沪深300自由现金流策略配置
name: hs300_fcf
description: 沪深300自由现金流选股策略 (对标932366.CSI)

# 样本空间
universe:
  index_code: "000300.SH"        # 沪深300
  index_name: "沪深300"

# 选股规则
selection:
  top_n: 50                       # 选股数量
  use_ttm: true                   # 使用TTM数据口径
  skip_turnover_filter: true      # HS300成分股已通过流动性筛选, 跳过成交额过滤

# 行业过滤
industry_filter:
  method: "shenwan_plus_keywords" # 申万分类 + 关键词兜底
  excluded_industries:
    - "银行"
    - "证券"
    - "保险"
    - "多元金融"
    - "房地产开发"
    - "房地产服务"
  excluded_keywords:
    - "金融"
    - "银行"
    - "证券"
    - "保险"
    - "地产"
    - "房产"

# FCF计算
fcf:
  # 932366口径: 购建固定资产支付现金
  # 注: tushare c_pay_acq_const_fiolta 已包含无形资产和其他长期资产
  # 932366官方口径仅含"购建固定资产", 但tushare无法拆分, 统一用fiolta
  capex_field: "c_pay_acq_const_fiolta"

  # TTM参考期映射 (调仓月 → 季报)
  ttm_ref_periods:
    "03": "0930"    # 3月调仓 → 上年Q3
    "06": "0331"    # 6月调仓 → 当年Q1
    "09": "0630"    # 9月调仓 → 当年Q2
    "12": "0930"    # 12月调仓 → 当年Q3

  # 5年OCF检查
  ocf_5yr:
    mode: "ttm_first_annual_fallback"  # TTM优先, 年报回退
    window: 5                           # 连续5年

  # 盈利质量
  profit_quality:
    formula: "(OCF - oper_profit) / total_assets"
    cutoff_percentile: 20              # 剔除后20% (即前80%)

# 加权方式
weighting:
  method: "fcf_weighted"
  single_stock_cap: 0.10                # 单只上限10%
  redistribution: "iterative"           # 迭代封顶重分配

# 调仓频率
rebalance:
  frequency: "quarterly"
  rule: "second_friday_next_tradeday"   # 第二个星期五下一交易日
  months: [3, 6, 9, 12]

# 防前视偏差
look_ahead_protection:
  annual_report: "ann_date_as_of"       # 仅使用调仓日之前公告的年报
  quarterly_report: "ann_date_as_of"    # 季报同理
  market_cap: "trade_date_as_of"        # 市值用调仓日当日

# 验证结果 (2024-12-16 vs 932366.CSI)
validation:
  date: "2024-12-16"
  benchmark: "932366.CSI"
  recall: 0.92                          # 46/50
  spearman: 0.9955                      # 封顶后
  missing_count: 4
  missing_reason: "排名边界51-62, 市值/EV数据精度差异"

# 数据源
data_source:
  financials: "tushare"
  market_cap: "tushare daily_basic"
  index_constituents: "tushare index_weight"
